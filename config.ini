[general]
base_output_dir = ~/Scans
log_level = INFO

[users]
names = Server, Invoices, Documents

[device]
printer_ip = 192.168.0.253
udp_port = 54925
scan_port = 54921

[timing]
post_probe_sleep = 0.35
first_data_timeout = 30
quiet_timeout = 15
hard_deadline = 240

[debug]
save_raw_stream = no
save_payload = no

[hooks]
post_scan_command =

[func:FILE]
folder = File
user_subdir = yes
probe_psrc = ADF
resolution = 100
base_area = 12,4,839,1169
ssp_psrc = AUTO
ssp_clr = C24BIT
ssp_area = NORMAL
ssp_mrgn = 0,0,0,0
ssp_dplx = OFF
ssp_brit = 50
ssp_cont = 50
ssp_comp = JPEG
ssp_jsf = 420
ssp_iprc = NORMAL
ssp_ptype = NORMAL
ssp_page = 0
ssp_long = OFF
ssp_carr = OFF
ssp_rmgc = OFF
ssp_dtdf = OFF
ssp_dt4v = OFF
ssp_dskw = OFF
ssp_lsmd = OFF
ssp_rmbp = OFF
ssp_rmmr = OFF
ssp_gmma = OFF
ssp_tone = OFF
ssp_qtfd = OFF
ssp_atcn = OFF
ssp_atcrp = OFF
xsc_mode = NORMAL

